<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solitas 13 — Depósito Industrial</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; background:#1c1c1c; font-family:'Segoe UI',sans-serif; }

/* ── HEADER ── */
#header {
  height:52px; background:#111; border-bottom:1px solid #2a2a2a;
  display:flex; align-items:center; padding:0 20px; gap:20px; flex-shrink:0;
}
.h-brand { color:#c8a84b; font-size:11px; letter-spacing:3px; font-weight:700; white-space:nowrap; }
.h-title { color:#e0e0e0; font-size:13px; font-weight:600; }
.h-sub   { color:#555; font-size:10px; }
.h-sep   { width:1px; height:28px; background:#2a2a2a; flex-shrink:0; }
.h-pill  { background:#1e1e1e; border:1px solid #333; border-radius:3px;
           padding:3px 10px; font-size:10px; color:#888; white-space:nowrap; }
.h-pill b { color:#c8a84b; }
.spacer  { flex:1; }
.h-btn {
  background:transparent; border:1px solid #333; color:#888;
  border-radius:4px; padding:4px 12px; font-size:11px; cursor:pointer;
  transition:all .2s; white-space:nowrap;
}
.h-btn:hover { border-color:#c8a84b; color:#c8a84b; }
.h-btn.on    { border-color:#c8a84b; color:#c8a84b; background:rgba(200,168,75,0.08); }

/* ── VIEWPORT ── */
#vp {
  position:fixed; inset:52px 0 0 0;
  overflow:hidden; cursor:grab;
  background: radial-gradient(ellipse 120% 80% at 50% 30%, #2a2a2a 0%, #111 100%);
}
#vp.grabbing { cursor:grabbing; }
#svg { display:block; overflow:visible; }

/* ── TOOLTIP ── */
#tt {
  position:fixed; pointer-events:none; opacity:0; transition:opacity .12s;
  background:rgba(10,10,10,0.95); border:1px solid #333; border-radius:6px;
  padding:10px 14px; z-index:99; min-width:170px;
  box-shadow:0 8px 30px rgba(0,0,0,.6);
}
.tt-id   { font-size:15px; font-weight:700; color:#c8a84b; margin-bottom:4px; }
.tt-zone { font-size:10px; color:#666; letter-spacing:1px; margin-bottom:6px; }
.tt-row  { font-size:11px; color:#aaa; margin:2px 0; }
.tt-row b { color:#ddd; }
.tt-swatch { display:inline-block; width:10px; height:10px;
             border-radius:2px; margin-right:6px; vertical-align:middle; }

/* ── LEGEND ── */
#legend {
  position:fixed; bottom:18px; left:18px;
  background:rgba(10,10,10,0.88); border:1px solid #2a2a2a; border-radius:6px;
  padding:12px 16px; font-size:10px;
}
.lg-title { color:#444; letter-spacing:2px; margin-bottom:8px; font-size:9px; }
.lg-row   { display:flex; align-items:center; gap:8px; color:#777; margin:4px 0; }
.lg-box   { width:16px; height:10px; border-radius:2px; flex-shrink:0; }

/* ── ZOOM CONTROLS ── */
#zc {
  position:fixed; bottom:18px; right:18px;
  display:flex; flex-direction:column; gap:4px;
}
.zb {
  width:32px; height:32px; background:rgba(10,10,10,0.88);
  border:1px solid #2a2a2a; color:#666; font-size:18px;
  border-radius:5px; cursor:pointer; display:flex; align-items:center;
  justify-content:center; transition:all .2s;
}
.zb:hover { border-color:#c8a84b; color:#c8a84b; }

/* ── SCALE BAR ── */
#sb {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  color:#444; font-size:10px; text-align:center; letter-spacing:1px;
}
</style>
</head>
<body>

<div id="header">
  <div>
    <div class="h-brand">DEPÓSITO INDUSTRIAL</div>
    <div class="h-title">SOLITAS 13 — BURZACO</div>
  </div>
  <div class="h-sub">Vista isométrica · Layout de almacenamiento</div>
  <div class="h-sep"></div>
  <div class="h-pill">Fondo F: <b>8</b></div>
  <div class="h-pill">Columna I: <b>29</b></div>
  <div class="h-pill">Relleno R: <b>55 pos.</b></div>
  <div class="h-pill">Total: <b>147</b> módulos</div>
  <div class="spacer"></div>
  <button class="h-btn on" id="btn-labels">Etiquetas</button>
  <button class="h-btn on" id="btn-cotas">Cotas</button>
  <button class="h-btn"    id="btn-reset">⊡ Ajustar</button>
</div>

<div id="vp">
  <svg id="svg" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000" flood-opacity=".4"/>
      </filter>
      <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
        <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#c8a84b" flood-opacity=".8"/>
      </filter>
      <!-- Concrete floor pattern -->
      <pattern id="floor-pat" patternUnits="userSpaceOnUse" width="60" height="60">
        <rect width="60" height="60" fill="#cac4b8"/>
        <line x1="0" y1="0" x2="60" y2="0" stroke="#b8b2a6" stroke-width=".5"/>
        <line x1="0" y1="0" x2="0" y2="60" stroke="#b8b2a6" stroke-width=".5"/>
        <line x1="30" y1="0" x2="30" y2="60" stroke="#c0bab0" stroke-width=".3" opacity=".5"/>
        <line x1="0" y1="30" x2="60" y2="30" stroke="#c0bab0" stroke-width=".3" opacity=".5"/>
      </pattern>
    </defs>
  </svg>
  <div id="tt"></div>
</div>

<div id="legend">
  <div class="lg-title">LEYENDA</div>
  <div class="lg-row"><div class="lg-box" style="background:#4a8fc4"></div>Fila de fondo (F)</div>
  <div class="lg-row"><div class="lg-box" style="background:#c4844a"></div>Columna lateral (I)</div>
  <div class="lg-row"><div class="lg-box" style="background:#4aaa6a"></div>Rack cara A (R-a)</div>
  <div class="lg-row"><div class="lg-box" style="background:#388050"></div>Rack cara B (R-b)</div>
</div>

<div id="zc">
  <div class="zb" id="zin">+</div>
  <div class="zb" id="zout">−</div>
</div>

<div id="sb" id="sb"></div>

<script>
// ═══════════════════════════════════════════
// PARAMETROS DEPÓSITO
// ═══════════════════════════════════════════
const ANCHO=19.67, ALTO=76.79;
const R_SUP=0.80, R_INF=3.00;
const FONDO_W=2.40, FONDO_H=1.50;
const IZQ_W=2.30, IZQ_H=2.40;
const P_IZQ=3.00, P_FR=3.00;
const R_W=2.40, R_H=1.50, R_PAIR=3.00;
const P_FILA=3.30;

// Alturas 3D reales (metros)
const H3D = { F:2.2, I:5.0, Ra:5.0, Rb:5.0 };

// ═══════════════════════════════════════════
// ISOMETRICO
// ═══════════════════════════════════════════
const S = 7;  // px/metro
const C30 = Math.cos(Math.PI/6); // 0.866
const S30 = Math.sin(Math.PI/6); // 0.500

function iso(x, y, z) {
  // x: ancho (→), y: profundidad (↑ lejos), z: altura
  return [
    (x - y) * C30 * S,
    (x + y) * S30 * S - z * S
  ];
}

const MARGIN = 80;
const OX = ALTO * C30 * S + MARGIN;
const OY = Math.max(...Object.values(H3D)) * S + MARGIN + 40;

const SVG_W = (ANCHO + ALTO) * C30 * S + MARGIN * 2;
const SVG_H = (ANCHO + ALTO) * S30 * S + Math.max(...Object.values(H3D)) * S + MARGIN * 2;

const svg = document.getElementById('svg');
svg.setAttribute('width', SVG_W);
svg.setAttribute('height', SVG_H);

function svgEl(tag, attrs, parent) {
  const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k,v] of Object.entries(attrs||{})) e.setAttribute(k,v);
  if (parent) parent.appendChild(e);
  return e;
}

function pt(x, y, z) {
  const [px, py] = iso(x, y, z);
  return `${OX+px},${OY+py}`;
}

function poly(pts, attrs, parent) {
  return svgEl('polygon', { points: pts.join(' '), ...attrs }, parent);
}

// ═══════════════════════════════════════════
// COLORES POR TIPO
// ═══════════════════════════════════════════
const COL = {
  F:  { right:'#1e5a8a', front:'#2e7ab8', top:'#4a9fd4', edge:'#0e3a5a', label:'#e8f4fc' },
  I:  { right:'#8a4a10', front:'#b86520', top:'#d88840', edge:'#5a2a00', label:'#fdf0e0' },
  Ra: { right:'#1a6030', front:'#2a8848', top:'#48b868', edge:'#0a3818', label:'#e8fdf0' },
  Rb: { right:'#124828', front:'#1e6838', top:'#389858', edge:'#082818', label:'#e0f8ea' },
};

// ═══════════════════════════════════════════
// GRUPOS SVG (orden de pintado)
// ═══════════════════════════════════════════
const gFloor    = svgEl('g', {id:'g-floor'},  svg);
const gWalls    = svgEl('g', {id:'g-walls'},  svg);
const gShadows  = svgEl('g', {id:'g-shadows'},svg);
const gRacks    = svgEl('g', {id:'g-racks'},  svg);
const gLabels   = svgEl('g', {id:'g-labels'}, svg);
const gCotas    = svgEl('g', {id:'g-cotas'},  svg);

// ═══════════════════════════════════════════
// PISO
// ═══════════════════════════════════════════
// Cara superior del piso (z=0), cuatro esquinas
poly([
  pt(0,0,0), pt(ANCHO,0,0), pt(ANCHO,ALTO,0), pt(0,ALTO,0)
], { fill:'url(#floor-pat)', stroke:'#a0988e', 'stroke-width':1.5 }, gFloor);

// Borde del piso (grosor visual)
poly([
  pt(0,0,0), pt(0,0,-0.15), pt(ANCHO,0,-0.15), pt(ANCHO,0,0)
], { fill:'#888', stroke:'none' }, gFloor);
poly([
  pt(0,0,0), pt(0,0,-0.15), pt(0,ALTO,-0.15), pt(0,ALTO,0)
], { fill:'#777', stroke:'none' }, gFloor);

// ═══════════════════════════════════════════
// MUROS (cara interna, z=0 a 7m)
// ═══════════════════════════════════════════
const WH = 7; // altura muro
// Muro trasero (y=ALTO)
poly([
  pt(0,ALTO,0), pt(ANCHO,ALTO,0), pt(ANCHO,ALTO,WH), pt(0,ALTO,WH)
], { fill:'#3a3632', stroke:'#2a2622', 'stroke-width':.5 }, gWalls);
// Muro lateral derecho (x=ANCHO)
poly([
  pt(ANCHO,0,0), pt(ANCHO,ALTO,0), pt(ANCHO,ALTO,WH), pt(ANCHO,0,WH)
], { fill:'#2e2b28', stroke:'#1e1b18', 'stroke-width':.5 }, gWalls);
// Muro lateral izquierdo (x=0) - más claro (iluminado)
poly([
  pt(0,0,0), pt(0,ALTO,0), pt(0,ALTO,WH), pt(0,0,WH)
], { fill:'#4a4642', stroke:'#3a3632', 'stroke-width':.5 }, gWalls);
// Muro frontal (y=0)
poly([
  pt(0,0,0), pt(ANCHO,0,0), pt(ANCHO,0,WH), pt(0,0,WH)
], { fill:'#3e3b38', stroke:'#2e2b28', 'stroke-width':.5 }, gWalls);

// Vigas del techo (líneas)
for (let y=0; y<=ALTO; y+=6) {
  svgEl('line', {
    x1:OX+iso(0,y,WH)[0],   y1:OY+iso(0,y,WH)[1],
    x2:OX+iso(ANCHO,y,WH)[0], y2:OY+iso(ANCHO,y,WH)[1],
    stroke:'#2a2622', 'stroke-width':1.2, opacity:.6
  }, gWalls);
}
// Columnas estructurales
for (let y=0; y<=ALTO; y+=8) {
  const cw=0.3;
  poly([
    pt(0,y,0),pt(cw,y,0),pt(cw,y,WH),pt(0,y,WH)
  ],{fill:'#555',stroke:'#333','stroke-width':.5},gWalls);
  poly([
    pt(ANCHO-cw,y,0),pt(ANCHO,y,0),pt(ANCHO,y,WH),pt(ANCHO-cw,y,WH)
  ],{fill:'#444',stroke:'#333','stroke-width':.5},gWalls);
}

// ═══════════════════════════════════════════
// RACKS — colectar y ordenar
// ═══════════════════════════════════════════
const rackList = [];

function reg(x, y, w, d, id, tipo, z0=0) {
  rackList.push({ x, y, w, d, id, tipo, z0, h: H3D[tipo] });
}

// Fila F
const nF = Math.floor(ANCHO/FONDO_W);
for (let i=0; i<nF; i++) reg(i*FONDO_W, R_SUP, FONDO_W, FONDO_H, `F-${String(i+1).padStart(2,'0')}`, 'F');

// Columna I
const yC = R_SUP+FONDO_H;
const altI = ALTO-yC-R_INF;
const nI = Math.floor(altI/IZQ_H);
for (let i=0; i<nI; i++) reg(0, yC+i*IZQ_H, IZQ_W, IZQ_H, `I-${String(i+1).padStart(2,'0')}`, 'I');

// Relleno R
const yR = R_SUP+FONDO_H+P_FR;
const xR = IZQ_W+P_IZQ;
const altR = ALTO-yR-R_INF;
const nCols = Math.floor((ANCHO-xR)/R_W);
const nFilas = Math.floor((altR+P_FILA)/(R_PAIR+P_FILA));
let cnt=1;
for (let f=0; f<nFilas; f++) {
  const yt = yR+f*(R_PAIR+P_FILA);
  for (let c=0; c<nCols; c++) {
    const xc = xR+c*R_W;
    const id = String(cnt).padStart(2,'0');
    reg(xc, yt,       R_W, R_H, `R-${id}a`, 'Ra');
    reg(xc, yt+R_H,   R_W, R_H, `R-${id}b`, 'Rb');
    cnt++;
  }
}

// Ordenar: mayor (x+y) primero (painter's algorithm)
rackList.sort((a,b) => (b.x+b.y+b.y) - (a.x+a.y+a.y));

// ═══════════════════════════════════════════
// DIBUJAR RACKS
// ═══════════════════════════════════════════
const rackEls = {}; // id → { g, rect-front, rect-top, rect-right }

function drawRack(r) {
  const { x, y, w, d, id, tipo, z0, h } = r;
  const col = COL[tipo];
  const g = svgEl('g', {'data-id':id,'data-tipo':tipo,'data-x':x,'data-y':y,'data-w':w,'data-d':d}, gRacks);
  g.style.cursor = 'pointer';

  // Sombra no fill (elipse en piso)
  const [cx,cy] = iso(x+w/2, y+d/2, 0);
  svgEl('ellipse', {
    cx:OX+cx, cy:OY+cy,
    rx: w*C30*S*0.8, ry: w*S30*S*0.6,
    fill:'rgba(0,0,0,0.25)', opacity:.5
  }, gShadows);

  // Cara derecha (x = x+w, y=y..y+d, z=0..h) — más oscura
  const fRight = poly([
    pt(x+w,y,z0), pt(x+w,y+d,z0), pt(x+w,y+d,z0+h), pt(x+w,y,z0+h)
  ], { fill:col.right, stroke:col.edge, 'stroke-width':.8 }, g);

  // Cara frontal (y=y, x=x..x+w, z=0..h) — media
  const fFront = poly([
    pt(x,y,z0), pt(x+w,y,z0), pt(x+w,y,z0+h), pt(x,y,z0+h)
  ], { fill:col.front, stroke:col.edge, 'stroke-width':.8 }, g);

  // Líneas de estantes (frente)
  const nSh = Math.max(2, Math.round(h/0.9));
  for (let s=1; s<nSh; s++) {
    const zs = z0 + h*(s/nSh);
    svgEl('line', {
      x1:OX+iso(x,y,zs)[0],   y1:OY+iso(x,y,zs)[1],
      x2:OX+iso(x+w,y,zs)[0], y2:OY+iso(x+w,y,zs)[1],
      stroke:col.edge, 'stroke-width':.6, opacity:.6
    }, g);
  }

  // Cara superior (z=h) — más clara
  const fTop = poly([
    pt(x,y,z0+h), pt(x+w,y,z0+h), pt(x+w,y+d,z0+h), pt(x,y+d,z0+h)
  ], { fill:col.top, stroke:col.edge, 'stroke-width':.8 }, g);

  // Etiqueta en cara frontal
  const [lx,ly] = iso(x+w/2, y, z0+h/2);
  const lbl = svgEl('text', {
    x: OX+lx, y: OY+ly,
    'font-size':5.5, fill:col.label,
    'font-family':'Segoe UI,Arial',
    'font-weight':'700',
    'text-anchor':'middle',
    'dominant-baseline':'middle',
    'pointer-events':'none'
  }, gLabels);
  lbl.textContent = id;

  // Interactividad
  let selected = false;
  g.addEventListener('mouseenter', e => {
    if (!selected) {
      fFront.setAttribute('fill', lighten(col.front));
      fTop.setAttribute('fill', lighten(col.top));
    }
    showTT(e, r);
  });
  g.addEventListener('mouseleave', () => {
    if (!selected) {
      fFront.setAttribute('fill', col.front);
      fTop.setAttribute('fill', col.top);
    }
    hideTT();
  });
  g.addEventListener('mousemove', e => moveTT(e));
  g.addEventListener('click', () => {
    selected = !selected;
    if (selected) {
      fFront.setAttribute('fill', '#c8a84b');
      fTop.setAttribute('fill', '#e0c060');
      fRight.setAttribute('fill', '#a88830');
    } else {
      fFront.setAttribute('fill', col.front);
      fTop.setAttribute('fill', col.top);
      fRight.setAttribute('fill', col.right);
    }
  });

  rackEls[id] = g;
}

function lighten(hex) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+40)},${Math.min(255,g+40)},${Math.min(255,b+40)})`;
}

rackList.forEach(drawRack);

// ═══════════════════════════════════════════
// COTAS 2D (proyectadas sobre el piso z=0)
// ═══════════════════════════════════════════
function cotaISO(x1,y1,x2,y2,label,off='top') {
  const g = svgEl('g',{},gCotas);
  const [ax,ay]=iso(x1,y1,0.05), [bx,by]=iso(x2,y2,0.05);
  svgEl('line',{x1:OX+ax,y1:OY+ay,x2:OX+bx,y2:OY+by,
    stroke:'#1a6bb5','stroke-width':.7,'stroke-dasharray':'3,2'},g);
  const mx=OX+(ax+bx)/2, my=OY+(ay+by)/2;
  svgEl('circle',{cx:OX+ax,cy:OY+ay,r:2,fill:'#1a6bb5'},g);
  svgEl('circle',{cx:OX+bx,cy:OY+by,r:2,fill:'#1a6bb5'},g);
  const t=svgEl('text',{x:mx,y:my-5,'font-size':7,fill:'#4a9ff5',
    'font-family':'Segoe UI','font-weight':'600','text-anchor':'middle',
    'pointer-events':'none'},g);
  t.textContent=label;
}

// Cotas clave
cotaISO(0,0, ANCHO,0, `${ANCHO} m`);
cotaISO(0,0, 0,ALTO, `${ALTO} m`);
cotaISO(0,R_SUP, 0,R_SUP+FONDO_H, `${FONDO_H}`);
cotaISO(0,yC, 0,yR, `${P_FR}`);
cotaISO(0,ALTO-R_INF, 0,ALTO, `${R_INF}`);
cotaISO(0,yR, IZQ_W,yR, `${IZQ_W}`);
cotaISO(IZQ_W,yR, xR,yR, `${P_IZQ}`);
cotaISO(xR,yR, xR+R_W,yR, `${R_W}`);

// ═══════════════════════════════════════════
// TOOLTIP
// ═══════════════════════════════════════════
const tt = document.getElementById('tt');
const ZONE = {F:'FILA DE FONDO',I:'COLUMNA LATERAL',Ra:'RELLENO — CARA A',Rb:'RELLENO — CARA B'};
const SCOL = {F:'#4a8fc4',I:'#c4844a',Ra:'#4aaa6a',Rb:'#388050'};

function showTT(e, r) {
  tt.innerHTML=`
    <div class="tt-id"><span class="tt-swatch" style="background:${SCOL[r.tipo]}"></span>${r.id}</div>
    <div class="tt-zone">${ZONE[r.tipo]}</div>
    <div class="tt-row">📐 <b>${r.w} × ${r.d} m</b> en planta</div>
    <div class="tt-row">📦 Altura rack: <b>${H3D[r.tipo]} m</b></div>
    <div class="tt-row">📊 Área: <b>${(r.w*r.d).toFixed(2)} m²</b></div>`;
  tt.style.opacity=1;
  moveTT(e);
}
function hideTT()  { tt.style.opacity=0; }
function moveTT(e) {
  let lx=e.clientX+16, ly=e.clientY+16;
  if(lx+190>window.innerWidth)  lx=e.clientX-200;
  if(ly+130>window.innerHeight) ly=e.clientY-140;
  tt.style.left=lx+'px'; tt.style.top=ly+'px';
}

// ═══════════════════════════════════════════
// PAN + ZOOM
// ═══════════════════════════════════════════
const vp = document.getElementById('vp');
let vx=0, vy=0, vz=1, drag=false, lx=0, ly=0;

function applyT() {
  svg.style.transform=`translate(${vx}px,${vy}px) scale(${vz})`;
  svg.style.transformOrigin='0 0';
  updateSB();
}

function fitView() {
  const W=vp.clientWidth, H=vp.clientHeight;
  // Fit por ancho
  vz = (W-60) / SVG_W;
  vx = (W-SVG_W*vz)/2;
  vy = 20;
  applyT();
}

vp.addEventListener('mousedown',e=>{drag=true;lx=e.clientX;ly=e.clientY;vp.classList.add('grabbing');});
window.addEventListener('mouseup',()=>{drag=false;vp.classList.remove('grabbing');});
window.addEventListener('mousemove',e=>{
  if(!drag)return;
  vx+=e.clientX-lx; vy+=e.clientY-ly; lx=e.clientX; ly=e.clientY; applyT();
});

vp.addEventListener('wheel',e=>{
  e.preventDefault();
  if(e.ctrlKey||e.metaKey){
    const f=e.deltaY<0?1.12:.89;
    const r=vp.getBoundingClientRect();
    const mx=e.clientX-r.left, my=e.clientY-r.top;
    vx=mx-(mx-vx)*f; vy=my-(my-vy)*f; vz*=f;
  } else {
    vy-=e.deltaY*.9;
    if(e.shiftKey) vx-=e.deltaY*.9;
  }
  applyT();
},{passive:false});

document.getElementById('zin').onclick  = ()=>{vz*=1.2;applyT();};
document.getElementById('zout').onclick = ()=>{vz/=1.2;applyT();};
document.getElementById('btn-reset').onclick = fitView;

let labelsOn=true, cotasOn=true;
document.getElementById('btn-labels').onclick=function(){
  labelsOn=!labelsOn;
  gLabels.style.display=labelsOn?'':'none';
  this.classList.toggle('on',labelsOn);
};
document.getElementById('btn-cotas').onclick=function(){
  cotasOn=!cotasOn;
  gCotas.style.display=cotasOn?'':'none';
  this.classList.toggle('on',cotasOn);
};

// Touch
let touches=[];
vp.addEventListener('touchstart',e=>{touches=[...e.touches];},{passive:true});
vp.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&touches.length===1){
    vx+=e.touches[0].clientX-touches[0].clientX;
    vy+=e.touches[0].clientY-touches[0].clientY;
  }
  if(e.touches.length===2&&touches.length===2){
    const d0=Math.hypot(touches[1].clientX-touches[0].clientX,touches[1].clientY-touches[0].clientY);
    const d1=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
    vz*=d1/d0;
  }
  touches=[...e.touches]; applyT();
},{passive:false});

// Scale bar
function updateSB(){
  const sb=document.getElementById('sb');
  const realM=80/(S*vz);
  const nice=[1,2,5,10,20,50].find(v=>v>=realM)||50;
  const bpx=nice*S*vz;
  sb.innerHTML=`<svg width="${bpx}" height="10" style="display:block;margin:0 auto 2px">
    <line x1="0" y1="5" x2="${bpx}" y2="5" stroke="#444" stroke-width="1.5"/>
    <line x1="0" y1="2" x2="0" y2="8" stroke="#444" stroke-width="1.5"/>
    <line x1="${bpx}" y1="2" x2="${bpx}" y2="8" stroke="#444" stroke-width="1.5"/>
  </svg><span>${nice} m</span>`;
}

window.addEventListener('load', fitView);
window.addEventListener('resize', fitView);
</script>
